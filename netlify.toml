[build]
  command = "pnpm run build"
  publish = "dist"
  environment = { SECRETS_SCAN_OMIT_KEYS = "GITHUB_OWNER,GITHUB_REPO" }

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

[dev]
  framework = "#static"
  port = 8888
  autoLaunch = false
